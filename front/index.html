<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma Bibliothèque</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">📚 Ma Bibliothèque</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="showBooks()">Livres</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="showShareForm()">Partager un livre</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <!-- Section liste des livres -->
<div id="books-section" class="row">
    <h2 class="col-12">Liste des livres</h2>
    <div id="books-list" class="row col-12"></div>
  </div>

  <!-- Section formulaire — cachée par défaut -->
  <div id="share-form-section" style="display: none;">
    <h2>Partager un livre</h2>
    <form onsubmit="handleFormSubmit(event)" class="card p-4">
      <div class="mb-3">
        <label for="title" class="form-label">Titre</label>
        <input type="text" class="form-control" id="title" placeholder="Ex: Le Petit Prince" required />
      </div>
      <div class="mb-3">
        <label for="author" class="form-label">Auteur</label>
        <input type="text" class="form-control" id="author" placeholder="Ex: Antoine de Saint-Exupéry" required />
      </div>
      <div class="mb-3">
        <label for="year" class="form-label">Année de publication</label>
        <input type="number" class="form-control" id="year" placeholder="Ex: 1943" min="0" max="2099" required />
      </div>
      <div class="mb-3">
        <label for="genre" class="form-label">Genre</label>
        <input type="text" class="form-control" id="genre" placeholder="Ex: Fiction, Roman, Sci-Fi..." required />
      </div>
      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" rows="3" placeholder="Description du livre" required></textarea>
      </div>
      <div class="mb-3">
        <label for="image" class="form-label">Image URL</label>
        <input type="url" class="form-control" id="image" placeholder="URL de l'image">
      </div>
      <button type="submit" class="btn btn-primary">📤 Soumettre le livre</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/script.js"></script>
</body>
</html>
