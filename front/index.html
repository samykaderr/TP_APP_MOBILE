<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BookSwap - Échange de livres</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#"><span aria-hidden="true">📚</span>BookSwap</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Mes livres</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Messages</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Profil</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="shareBookMenu">Partager un livre</a></li>
                </ul>
                <form id="search-form" class="d-flex" role="search">
                    <input id="search-input" class="form-control me-2" type="search" placeholder="Rechercher un titre ou un auteur" aria-label="Rechercher">
                    <button class="btn btn-light" type="submit">Rechercher</button>
                </form>
                <button class="btn btn-warning ms-2" type="button" data-bs-toggle="modal" data-bs-target="#addBookModal">Ajouter un livre</button>
            </div>
        </div>
    </nav>

    <main class="py-4">
        <section class="container">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <p class="text-muted mb-1">Échangez vos lectures préférées</p>
                    <h2 class="mb-0">Livres disponibles</h2>
                </div>
                <span class="badge bg-info text-dark" id="book-count"></span>
            </div>
            <div id="books-grid" class="row g-4">
                <!-- Cartes de livres injectées par JS -->
            </div>
        </section>

        <div id="shareBookFormContainer" style="display: none;" class="container">
            <h2>Partager un livre</h2>
            <form id="shareBookForm" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="title" class="form-label">Titre</label>
                    <input type="text" class="form-control" id="title" name="title" placeholder="Titre du livre" required>
                </div>
                <div class="mb-3">
                    <label for="author" class="form-label">Auteur</label>
                    <input type="text" class="form-control" id="author" name="author" placeholder="Auteur" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3" placeholder="Quelques mots sur le livre" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="image" class="form-label">Image (URL)</label>
                    <input type="url" class="form-control" id="image" name="image" placeholder="https://...">
                    <div class="form-text">Optionnel : laissez vide pour utiliser une image par défaut.</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" id="cancelShareButton">Annuler</button>
                    <button type="submit" class="btn btn-primary">Partager</button>
                </div>
            </form>
        </div>
    </main>

    <div class="modal fade" id="addBookModal" tabindex="-1" aria-labelledby="addBookModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addBookModalLabel">Ajouter un livre</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>
                <form id="addBookForm" class="needs-validation" novalidate>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="book-title" class="form-label">Titre</label>
                            <input type="text" class="form-control" id="book-title" name="title" placeholder="Titre du livre" required>
                        </div>
                        <div class="mb-3">
                            <label for="book-author" class="form-label">Auteur</label>
                            <input type="text" class="form-control" id="book-author" name="author" placeholder="Auteur" required>
                        </div>
                        <div class="mb-3">
                            <label for="book-description" class="form-label">Description</label>
                            <textarea class="form-control" id="book-description" name="description" rows="3" placeholder="Quelques mots sur le livre" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="book-image" class="form-label">Image (URL)</label>
                            <input type="url" class="form-control" id="book-image" name="image" placeholder="https://...">
                            <div class="form-text">Optionnel : laissez vide pour utiliser une image par défaut.</div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-primary">Ajouter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="/js/script.js"></script>
    <script>
        // Show the form when "Share a book" is clicked
        document.getElementById('shareBookMenu').addEventListener('click', () => {
            document.getElementById('shareBookFormContainer').style.display = 'block';
        });

        // Function to handle form submission
        async function submitNewBook(event) {
            event.preventDefault();

            const formData = new FormData(event.target);
            const newBook = {
                title: formData.get('title').trim(),
                author: formData.get('author').trim(),
                description: formData.get('description').trim(),
                image: formData.get('image').trim() || 'https://placehold.co/400x600?text=Livre',
            };

            try {
                const response = await fetch('/books', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(newBook),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                alert('Livre partagé avec succès !');
                event.target.reset();
                document.getElementById('shareBookFormContainer').style.display = 'none';
            } catch (error) {
                console.error('Erreur lors du partage du livre :', error);
                alert('Échec du partage du livre. Veuillez réessayer.');
            }
        }

        // Attach the submit event listener to the form
        document.getElementById('shareBookForm').addEventListener('submit', submitNewBook);

        // Hide the share book form when cancel button is clicked
        document.getElementById('cancelShareButton').addEventListener('click', () => {
            document.getElementById('shareBookFormContainer').style.display = 'none';
        });
    </script>
</body>
</html>
